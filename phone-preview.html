<title>AMA & MyDime — Phone Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111827;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 48px 24px 64px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #e5e7eb;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 56px;
  }

  .phones {
    display: flex;
    gap: 72px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .phone-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .phone-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .phone-label.ama { color: #C9962E; }
  .phone-label.mydime { color: #ec4899; }

  /* Phone shell */
  .phone {
    position: relative;
    width: 282px;
    height: 590px;
    background: #18181b;
    border-radius: 44px;
    box-shadow:
      0 0 0 1.5px #3f3f46,
      0 0 0 10px #18181b,
      0 0 0 11.5px #3f3f46,
      0 32px 80px rgba(0,0,0,.7),
      inset 0 0 0 1px rgba(255,255,255,.04);
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Side buttons - left (volume) */
  .phone::before {
    content: '';
    position: absolute;
    left: -13px;
    top: 100px;
    width: 3px;
    height: 32px;
    background: #3f3f46;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 44px 0 #3f3f46;
  }

  /* Side button - right (power) */
  .phone::after {
    content: '';
    position: absolute;
    right: -13px;
    top: 130px;
    width: 3px;
    height: 56px;
    background: #3f3f46;
    border-radius: 0 3px 3px 0;
  }

  .screen {
    position: absolute;
    inset: 0;
    border-radius: 44px;
    overflow: hidden;
    background: #000;
  }

  .screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* Dynamic Island notch */
  .notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 88px;
    height: 26px;
    background: #18181b;
    border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,.05);
  }

  .app-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .app-name.ama { color: #e5e7eb; }
  .app-name span { color: #C9962E; }
  .app-name.mydime { color: #ec4899; }

  .app-desc {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    max-width: 220px;
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 99px;
  }
  .badge.ama { background: rgba(201,150,46,.12); color: #C9962E; border: 1px solid rgba(201,150,46,.25); }
  .badge.mydime { background: rgba(236,72,153,.1); color: #ec4899; border: 1px solid rgba(236,72,153,.2); }

  .url {
    font-size: 11px;
    color: #374151;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }
</style>
